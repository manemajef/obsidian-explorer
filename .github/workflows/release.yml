name: Release Plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"

          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)."
            exit 1
          fi

          if [[ ! "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Tag version ($TAG_VERSION) is not a supported SemVer release tag."
            exit 1
          fi

      - name: Build plugin
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RELEASE_FLAGS=()
          RELEASE_TITLE="$GITHUB_REF_NAME"

          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
            RELEASE_TITLE="$GITHUB_REF_NAME (beta)"
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" manifest.json main.js styles.css --clobber
            if [[ ${#RELEASE_FLAGS[@]} -gt 0 ]]; then
              gh release edit "$GITHUB_REF_NAME" "${RELEASE_FLAGS[@]}" --title "$RELEASE_TITLE"
            fi
          else
            gh release create "$GITHUB_REF_NAME" manifest.json main.js styles.css --generate-notes --title "$RELEASE_TITLE" "${RELEASE_FLAGS[@]}"
          fi
